name: CI

# The "maintained again" signal: prove that anyone can install, build, and run the
# unit tests on a clean machine, on every push and PR.
#
# Node is pinned via .nvmrc (22 — the Electron 42 toolchain / electron-builder 26 needs
# Node 20.12+/22.12+ for util.styleText + require(ESM)). webpack 4 still needs
# NODE_OPTIONS=--openssl-legacy-provider on any OpenSSL-3 Node; the build/start npm scripts
# set it via cross-env, so CI needs no special env. Removed by the Phase 1 webpack 5 migration.
#
# Scope notes (to be widened as the revival progresses):
#   * `npm run test:node` runs the pure-Node unit suite. Two legacy filesystem
#     tests (copy-project, cleanup) are excluded there because they depend on
#     mock-fs@4.10.1, which does not work on modern Node — tracked for repair.
#   * `npm run test:smoke` launches the real app under xvfb on Linux, opens a fixture
#     storyboard, and asserts boards render with no fatal renderer errors — the runtime
#     gate for the Electron modernization (a green build does not prove the app runs).
#     Covers the 2D main window; the shot-generator/XR/AR windows need driving the UI
#     (a future Playwright harness, viable once contextIsolation lands).
#   * The Electron renderer/main tests (`electron-mocha`, part of `npm test`) are still
#     deferred until they run headless reliably.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & unit test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install server deps
        run: npm install --legacy-peer-deps
        working-directory: server

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Build (all webpack targets)
        run: npm run build

      - name: Unit tests (Node)
        run: npm run test:node

      # Runtime smoke: launch the real app and confirm it renders. Linux-only because
      # xvfb gives Electron a headless display reliably; the GitHub macOS runners have
      # no window server for a GUI launch.
      - name: Install Electron runtime libs + xvfb (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libnotify-dev libnss3 libxss1 \
            libxtst6 xauth libasound2t64 libatk-bridge2.0-0 libgbm1 libgdk-pixbuf-2.0-0

      - name: Smoke test (Linux, xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:smoke
        env:
          SMOKE_SETTLE_MS: "30000"
