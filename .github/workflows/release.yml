name: Release build

# Produces installable app builds on demand (Actions → "Release build" → Run) and for
# version tags, and uploads them as workflow artifacts people can download. A tag push
# ADDITIONALLY publishes a GitHub Release with the binaries attached (marked prerelease
# for -alpha/-beta/-rc tags) — so cutting a release is: bump package.json version, tag
# `vX.Y.Z[-alpha.N]`, push the tag.
#
# Notes / current limits:
#   * No Developer ID / notarization (CSC_IDENTITY_AUTO_DISCOVERY=false — no Apple
#     credentials in CI). The afterPack hook (scripts/afterpack-adhoc-sign.js) ad-hoc
#     signs the full bundle so the app is at least VALIDLY signed: without it macOS
#     reports a quarantined download as "damaged" (a dead end); with it users get the
#     standard un-notarized flow (System Settings → "Open Anyway" on macOS 15+, or
#     `xattr -dr com.apple.quarantine Storyboarder.app`). Wire in the owner's Apple /
#     Windows credentials as secrets to remove the warning entirely.
#   * macOS is arm64 (Apple Silicon) only: npmRebuild is off (the Electron 42 toolchain
#     can't rebuild some old dev-only native deps — see package.json), so a universal /
#     x64 build would ship single-arch native modules. Revisit with the webpack 5 work.
#   * Linux ships an AppImage (portable, no install). Windows isn't built here yet.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# contents: write is needed by the publish job to create the GitHub Release; the
# package jobs never push anything.
permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            eb: --mac dmg --arm64
            out: dist/*.dmg
          - os: ubuntu-latest
            eb: --linux AppImage
            out: dist/*.AppImage
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install server deps
        run: npm install --legacy-peer-deps
        working-directory: server

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Build (webpack targets)
        run: npm run build

      # --publish never: build.publish points at our GitHub Releases, which would
      # otherwise make electron-builder try to upload (needs GH_TOKEN). We upload the
      # artifacts ourselves below instead.
      - name: Package (unsigned)
        run: npx electron-builder ${{ matrix.eb }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: storyboarder-${{ runner.os }}
          path: ${{ matrix.out }}
          if-no-files-found: error

  # On a tag push, publish everything the matrix built as a GitHub Release. A single
  # downstream job (rather than each package job publishing) avoids two runners racing
  # to create the same release.
  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PRERELEASE=""
          case "$TAG" in *-alpha*|*-beta*|*-rc*) PRERELEASE="--prerelease" ;; esac
          ls -l artifacts/
          gh release create "$TAG" $PRERELEASE \
            --repo "$GITHUB_REPOSITORY" \
            --title "Storyboarder $TAG" \
            --generate-notes \
            artifacts/*
